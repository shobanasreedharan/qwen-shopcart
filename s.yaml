edition: 1.0.0
name: smartcart-qwen-fc
access: default

services:
  smartcart-api:
    component: fc3
    props:
      region: ap-southeast-1
      functionName: smartcart-api
      description: SmartCart AI backend - Qwen MemoryAgent hackathon
      runtime: custom.debian10
      cpu: 1
      memorySize: 1024
      diskSize: 512
      timeout: 60
      instanceConcurrency: 5
      code: .
      customRuntimeConfig:
        command:
          - bash
          - bootstrap.sh
        port: 9000
      environmentVariables:
        QWEN_API_KEY: ${env(QWEN_API_KEY)}
        QWEN_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
        QWEN_MODEL: qwen-plus
        # Firebase Admin credentials — pass the JSON content as an env var
        # rather than shipping serviceAccountKey.json inside the image
        FIREBASE_CREDENTIALS_JSON: ${env(FIREBASE_CREDENTIALS_JSON)}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - OPTIONS